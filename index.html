<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Of Us · Neon Circuit</title>
<!--
  OF US : NEON CIRCUIT  —  Cyberpunk street racer
  Music by Delrogue. Single-file Three.js game for GitHub Pages.
  Drop this file in the repo root next to the "Of Us" mp3 files.
  Name it index.html so the Pages link opens the game directly.
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');
  :root{
    --cyan:#00f3ff; --pink:#ff2d95; --purple:#bc13fe; --amber:#ffb300;
    --bg:#050208; --danger:#ff3355;
  }
  *{box-sizing:border-box; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; overflow:hidden; background:var(--bg);
    font-family:'Orbitron', sans-serif; color:#fff; touch-action:none;}
  #game-container{position:fixed; inset:0; z-index:1;}
  canvas{display:block;}

  /* ---------- HUD ---------- */
  #ui{position:fixed; inset:0; z-index:10; pointer-events:none;
    display:flex; flex-direction:column; justify-content:space-between;}
  .hud-top{display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 16px; background:linear-gradient(to bottom, rgba(2,2,8,.85), transparent);}
  .credit{font-size:.75rem; color:var(--pink); text-shadow:0 0 6px var(--pink);
    border-left:3px solid var(--purple); padding-left:9px; line-height:1.3;}
  .credit b{display:block; font-size:1.05rem; color:#fff; letter-spacing:2px;}
  .hud-right{text-align:right;}
  .hud-label{font-size:.6rem; letter-spacing:3px; color:var(--cyan); opacity:.9;}
  #hud-score{font-size:1.7rem; font-weight:900; text-shadow:0 0 12px var(--cyan); line-height:1;}
  #hud-speed{font-size:.85rem; color:var(--amber); text-shadow:0 0 8px var(--amber); margin-top:2px;}
  #hud-dist{font-size:.7rem; color:#9df; opacity:.8; margin-top:2px;}

  #shield-row{position:fixed; top:14px; left:50%; transform:translateX(-50%);
    display:flex; gap:6px; z-index:11;}
  .cell{width:34px; height:12px; border:1px solid var(--cyan); border-radius:3px;
    background:rgba(0,243,255,.08); transition:all .25s;
    clip-path:polygon(15% 0,100% 0,85% 100%,0 100%);}
  .cell.on{background:var(--cyan); box-shadow:0 0 12px var(--cyan);}
  .cell.hurt{background:var(--danger); border-color:var(--danger); box-shadow:0 0 14px var(--danger);}

  #pause-btn{position:fixed; top:64px; right:16px; z-index:12; pointer-events:auto;
    width:42px; height:42px; border-radius:10px; border:1px solid rgba(255,255,255,.35);
    background:rgba(255,255,255,.08); color:#fff; font-size:1.1rem; display:flex;
    align-items:center; justify-content:center; backdrop-filter:blur(4px);}

  /* ---------- Warning banner ---------- */
  #warn{position:fixed; top:16%; left:50%; transform:translateX(-50%);
    z-index:12; padding:10px 26px; font-weight:900; letter-spacing:3px; font-size:1rem;
    color:#fff; background:rgba(255,40,60,.18); border:2px solid var(--danger);
    border-radius:8px; text-shadow:0 0 10px var(--danger);
    box-shadow:0 0 24px rgba(255,51,85,.5), inset 0 0 18px rgba(255,51,85,.25);
    opacity:0; transition:opacity .15s; white-space:nowrap; text-align:center;}
  #warn.show{opacity:1; animation:blink .32s steps(2) infinite;}
  @keyframes blink{50%{filter:brightness(1.9);}}

  /* ---------- Popups ---------- */
  #popups{position:fixed; top:30%; left:0; width:100%; z-index:12;
    pointer-events:none; text-align:center;}
  .pop{position:absolute; left:50%; width:100%; transform:translateX(-50%);
    font-weight:900; font-size:1.25rem; letter-spacing:2px;
    animation:popRise 1.15s ease-out forwards;}
  @keyframes popRise{
    0%{opacity:0; transform:translate(-50%,16px) scale(.7);}
    18%{opacity:1; transform:translate(-50%,0) scale(1.08);}
    75%{opacity:1;}
    100%{opacity:0; transform:translate(-50%,-42px) scale(1);}
  }

  /* ---------- Nitro ---------- */
  #nitro-wrap{position:fixed; left:50%; bottom:150px; transform:translateX(-50%);
    width:min(46vw,260px); z-index:11; pointer-events:none;}
  #nitro-wrap .hud-label{text-align:center; color:var(--amber); margin-bottom:3px;}
  #nitro-bar{height:10px; border:1px solid var(--amber); border-radius:6px; overflow:hidden;
    background:rgba(255,179,0,.08); transform:skewX(-18deg);}
  #nitro-fill{height:100%; width:40%;
    background:linear-gradient(90deg,#ff7a00,var(--amber),#fff6c8);
    box-shadow:0 0 14px var(--amber); transition:width .1s linear;}
  #nitro-fx{position:fixed; inset:0; z-index:9; pointer-events:none; opacity:0;
    transition:opacity .2s;
    background:radial-gradient(ellipse at center, transparent 42%, rgba(0,180,255,.28) 100%);}

  /* ---------- Touch controls ---------- */
  #controls{position:fixed; inset:0; z-index:15; pointer-events:none;}
  .ctl{position:fixed; bottom:calc(16px + env(safe-area-inset-bottom));
    width:86px; height:86px; border-radius:50%;
    border:2px solid var(--cyan); background:rgba(0,243,255,.08);
    display:flex; align-items:center; justify-content:center;
    font-size:2rem; color:#fff; backdrop-filter:blur(4px);
    box-shadow:inset 0 0 14px rgba(0,243,255,.15); pointer-events:auto;}
  #btn-left{left:14px;}
  #btn-right{right:14px;}
  .ctl.pressed{background:var(--cyan); color:#000; box-shadow:0 0 22px var(--cyan);}
  #btn-nitro{position:fixed; right:14px; bottom:calc(116px + env(safe-area-inset-bottom));
    pointer-events:auto; width:86px; height:86px; border-radius:50%;
    border:2px solid var(--amber); background:rgba(255,179,0,.1);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:.72rem; font-weight:900; letter-spacing:2px; color:#ffd76a;
    backdrop-filter:blur(4px); box-shadow:inset 0 0 16px rgba(255,179,0,.2);}
  #btn-nitro span{font-size:1.6rem; line-height:1;}
  #btn-nitro.pressed{background:var(--amber); color:#000; box-shadow:0 0 26px var(--amber);}

  /* steering wheel (joystick) mode */
  #joystick{position:fixed; left:16px; bottom:calc(16px + env(safe-area-inset-bottom));
    width:140px; height:140px; border-radius:50%; pointer-events:auto;
    border:2px solid var(--cyan); background:rgba(0,243,255,.06);
    backdrop-filter:blur(4px); box-shadow:inset 0 0 18px rgba(0,243,255,.12);
    display:none; align-items:center; justify-content:center; touch-action:none;}
  #joystick .hint{position:absolute; top:50%; transform:translateY(-50%);
    font-size:1rem; color:rgba(255,255,255,.4); pointer-events:none;}
  #joystick .hint.l{left:11px;} #joystick .hint.r{right:11px;}
  #joy-knob{width:60px; height:60px; border-radius:50%; pointer-events:none;
    background:rgba(0,243,255,.32); border:2px solid var(--cyan);
    box-shadow:0 0 16px rgba(0,243,255,.55);}
  body.mode-wheel #joystick{display:flex;}
  body.mode-wheel #btn-left, body.mode-wheel #btn-right{display:none;}
  body.mode-wheel #btn-nitro{bottom:calc(16px + env(safe-area-inset-bottom));}

  /* ---------- Menus ---------- */
  .menu{position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    background:rgba(3,2,10,.82); backdrop-filter:blur(9px);
    pointer-events:auto; transition:opacity .3s; padding:20px; overflow-y:auto;}
  .menu.hidden{opacity:0; pointer-events:none;}
  h1{font-size:clamp(2.4rem,9vw,4rem); margin:0; text-transform:uppercase; line-height:.95;
    background:linear-gradient(90deg,var(--cyan),var(--pink),var(--purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 18px rgba(188,19,254,.55));}
  h2{font-size:.85rem; letter-spacing:6px; opacity:.85; margin:10px 0 26px; font-weight:500;}
  .panel{width:min(92vw,420px); display:flex; flex-direction:column; gap:14px; margin-bottom:24px;}
  .box{border:1px solid var(--cyan); border-radius:10px; padding:12px 14px;
    background:rgba(255,255,255,.04); text-align:left;}
  .box label{display:block; font-size:.68rem; letter-spacing:2px; color:var(--cyan);
    text-transform:uppercase; margin-bottom:8px;}
  select{width:100%; background:rgba(0,0,0,.55); border:1px solid var(--purple); color:#fff;
    padding:11px; font-family:'Orbitron',sans-serif; font-size:.9rem; border-radius:6px; outline:none;}
  #status-audio{font-size:.65rem; color:#9aa; margin-top:6px; display:block;}
  .diff-row{display:flex; gap:8px;}
  .diff, .cmode{flex:1; padding:11px 4px; border-radius:6px; border:1px solid var(--purple);
    background:rgba(0,0,0,.4); color:#cbe; font-family:'Orbitron',sans-serif;
    font-size:.72rem; letter-spacing:1px; font-weight:700;}
  .diff.sel, .cmode.sel{background:var(--purple); color:#fff; box-shadow:0 0 16px var(--purple);}
  .go{background:var(--pink); color:#fff; border:none; padding:16px 56px;
    font-size:1.3rem; font-family:'Orbitron',sans-serif; font-weight:900; border-radius:50px;
    box-shadow:0 0 24px var(--pink); text-transform:uppercase; letter-spacing:3px;
    transition:transform .1s;}
  .go:active{transform:scale(.94);}
  .howto{margin-top:20px; font-size:.68rem; color:#9ab; line-height:1.9; letter-spacing:1px;}
  .howto b{color:var(--cyan);}
  .stats{font-size:.85rem; color:#bce; line-height:2; letter-spacing:1px; margin-bottom:8px;}
  .stats b{color:var(--amber);}
  #go-title{color:var(--danger); background:none; -webkit-text-fill-color:var(--danger);
    filter:drop-shadow(0 0 20px rgba(255,51,85,.7));}
  #go-quip{color:var(--cyan); font-size:.8rem; letter-spacing:2px; margin:6px 0 18px;}
  #final-score{font-size:3.2rem; font-weight:900; color:var(--purple);
    text-shadow:0 0 28px var(--purple); margin:4px 0 12px;}
</style>
</head>
<body>

<div id="game-container"></div>
<div id="nitro-fx"></div>

<!-- HUD -->
<div id="ui">
  <div class="hud-top">
    <div class="credit">Of Us<b>DELROGUE</b></div>
    <div class="hud-right">
      <div class="hud-label">SCORE</div>
      <div id="hud-score">0</div>
      <div id="hud-speed">0 km/h</div>
      <div id="hud-dist">0 m</div>
    </div>
  </div>
</div>
<div id="shield-row"></div>
<div id="pause-btn">II</div>
<div id="warn"></div>
<div id="popups"></div>
<div id="nitro-wrap">
  <div class="hud-label">NITRO</div>
  <div id="nitro-bar"><div id="nitro-fill"></div></div>
</div>

<!-- Touch controls -->
<div id="controls">
  <div class="ctl" id="btn-left">&#9664;</div>
  <div class="ctl" id="btn-right">&#9654;</div>
  <div id="joystick"><span class="hint l">&#9664;</span><div id="joy-knob"></div><span class="hint r">&#9654;</span></div>
  <div id="btn-nitro"><span>&#9889;</span>NITRO</div>
</div>

<!-- Start menu -->
<div id="start-screen" class="menu">
  <h1>OF US</h1>
  <h2>NEON CIRCUIT</h2>
  <div class="panel">
    <div class="box">
      <label>&#127925; Soundtrack</label>
      <select id="track-select">
        <option value="Of_Us__Remastered_.mp3">Of Us (Remastered)</option>
      </select>
      <span id="status-audio">Select a track</span>
    </div>
    <div class="box">
      <label>&#127937; Difficulty</label>
      <div class="diff-row">
        <button class="diff" data-d="0">ROOKIE</button>
        <button class="diff sel" data-d="1">RACER</button>
        <button class="diff" data-d="2">LEGEND</button>
      </div>
    </div>
    <div class="box">
      <label>&#127918; Controls</label>
      <div class="diff-row">
        <button class="cmode sel" data-c="arrows">ARROWS</button>
        <button class="cmode" data-c="wheel">WHEEL</button>
      </div>
    </div>
  </div>
  <button class="go" id="btn-start">START RACE</button>
  <div class="howto">
    <b>&#9664; &#9654;</b> steer around real corners &nbsp;·&nbsp; <b>&#9889;</b> hold for nitro<br>
    Watch for <b>laser lock</b> rings and <b>spike</b> warnings — dodge or jump the ramps!
  </div>
</div>

<!-- Game over -->
<div id="over-screen" class="menu hidden">
  <h1 id="go-title">WRECKED</h1>
  <div id="go-quip">SO CLOSE — GO AGAIN!</div>
  <div id="final-score">0</div>
  <div class="stats" id="go-stats"></div>
  <button class="go" id="btn-restart">RESTART</button>
</div>

<script>
(function(){
'use strict';

/* ============================== CONFIG ============================== */
const STEP = 6;            // metres between path points
const HALF = 7;            // half road width
const N_SEG = 84;          // pooled road segments
const DIFFS = [
  {name:'ROOKIE', maxSpeed:25, gapMul:1.3,  laserMul:1.35, shields:4},
  {name:'RACER',  maxSpeed:31, gapMul:1.0,  laserMul:1.0,  shields:3},
  {name:'LEGEND', maxSpeed:37, gapMul:0.78, laserMul:0.72, shields:3},
];
let diff = DIFFS[1];

/* ============================== STATE =============================== */
const S = { MENU:0, RUN:1, CRASH:2, OVER:3 };
let state = S.MENU;
let paused = false;
let timeScale = 1;

let carX=0, carZ=0, carY=0, carH=0, vy=0;
let speed = 12, carIdx = 0, carLong = 0, carLat = 0;
let steer = 0, airborne=false, airTime=0, onRamp=false, prevOnRamp=false, rampProg=0;
let shields = 3, invuln = 0, nitro = 40, nitroOn = false;
let score = 0, combo = 0, comboT = 0, runStart = 0, topSpeed = 0, bestDist = 0;
let laserT = 13, nextMilestone = 500;
let shake = 0, pulse = 0, elapsed = 0;

/* ============================== DOM ================================= */
const $ = id => document.getElementById(id);
const hudScore=$('hud-score'), hudSpeed=$('hud-speed'), hudDist=$('hud-dist');
const warnEl=$('warn'), popups=$('popups'), nitroFill=$('nitro-fill'), nitroFx=$('nitro-fx');
const shieldRow=$('shield-row');

/* ============================== AUDIO =============================== */
let ac=null, master=null, analyser=null, freqData=null, mediaSrc=null, musicOK=false;
const music = new Audio();
music.loop = true; music.crossOrigin = 'anonymous'; music.volume = 0.85;

function audioInit(){
  if(ac) return;
  try{
    ac = new (window.AudioContext||window.webkitAudioContext)();
    master = ac.createGain(); master.gain.value = 0.5; master.connect(ac.destination);
    analyser = ac.createAnalyser(); analyser.fftSize = 64;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    mediaSrc = ac.createMediaElementSource(music);
    mediaSrc.connect(analyser); analyser.connect(ac.destination);
  }catch(e){ ac = null; }
}
function beep(f0,f1,dur,type,vol){
  if(!ac) return;
  try{
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(f0,ac.currentTime);
    if(f1) o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),ac.currentTime+dur);
    g.gain.setValueAtTime(vol||0.12,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.connect(g); g.connect(master); o.start(); o.stop(ac.currentTime+dur+0.02);
  }catch(e){}
}
function noiseBurst(dur,vol,cut){
  if(!ac) return;
  try{
    const n=ac.sampleRate*dur, buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const src=ac.createBufferSource(); src.buffer=buf;
    const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cut||900;
    const g=ac.createGain(); g.gain.value=vol||0.3;
    src.connect(f); f.connect(g); g.connect(master); src.start();
  }catch(e){}
}
const sfx = {
  warn(){ beep(920,0,0.09,'square',0.1); setTimeout(()=>beep(920,0,0.09,'square',0.1),140); },
  laserCharge(){ beep(180,1500,1.55,'sine',0.08); },
  laserFire(){ beep(1800,70,0.32,'sawtooth',0.22); noiseBurst(0.35,0.35,2400); },
  pickup(){ beep(620,990,0.14,'triangle',0.14); },
  nitroPick(){ beep(420,880,0.2,'sawtooth',0.12); },
  hit(){ beep(140,50,0.28,'square',0.25); noiseBurst(0.3,0.4,700); },
  explode(){ noiseBurst(0.8,0.6,500); beep(90,28,0.7,'sawtooth',0.3); },
  spikes(){ beep(300,120,0.16,'square',0.16); },
  nitroGo(){ beep(260,720,0.32,'sawtooth',0.1); },
  land(){ noiseBurst(0.14,0.22,500); },
  near(){ beep(1300,1700,0.08,'triangle',0.08); },
  jump(){ beep(340,700,0.25,'sine',0.1); },
};

function loadTrack(file){
  musicOK = false;
  $('status-audio').textContent = 'Loading track…';
  music.src = file;
  music.onerror = ()=>{ $('status-audio').textContent = 'Track not found — racing without music'; };
  music.oncanplaythrough = ()=>{ musicOK=true; $('status-audio').textContent = 'Ready: '+decodeURIComponent(file); };
  music.load();
}

/* ======================= THREE / SCENE SETUP ======================== */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x130425, 45, 300);
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 900);
camera.position.set(0,4,8);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio||1, 1.6));
$('game-container').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x8877cc, 0.65));
const sun = new THREE.DirectionalLight(0xffc0f0, 0.55);
sun.position.set(-40, 60, -30); scene.add(sun);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------- Sky: dome gradient + skyline cylinder + stars + rain ---------- */
const skyGroup = new THREE.Group(); scene.add(skyGroup);
{
  const domeMat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false, fog:false,
    vertexShader:'varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} ',
    fragmentShader:
      'varying vec3 vP;'+
      'void main(){ float h=clamp(vP.y/640.0,0.0,1.0);'+
      ' vec3 hor=vec3(0.30,0.06,0.36); vec3 top=vec3(0.012,0.004,0.05);'+
      ' vec3 c=mix(hor,top,pow(h,0.55));'+
      ' c+=vec3(0.55,0.10,0.42)*exp(-h*9.0)*0.7;'+
      ' gl_FragColor=vec4(c,1.0);}'
  });
  const dome = new THREE.Mesh(new THREE.SphereGeometry(640,24,14), domeMat);
  dome.renderOrder=-3; skyGroup.add(dome);

  // skyline + synthwave sun on a canvas cylinder
  const cv=document.createElement('canvas'); cv.width=2048; cv.height=512;
  const g=cv.getContext('2d');
  const grd=g.createLinearGradient(0,150,0,420);
  grd.addColorStop(0,'#ffd166'); grd.addColorStop(.45,'#ff5aa7'); grd.addColorStop(1,'#b8179c');
  g.fillStyle=grd; g.beginPath(); g.arc(512,330,170,0,Math.PI*2); g.fill();
  g.globalCompositeOperation='destination-out';
  for(let y=250;y<512;y+=26){ g.fillRect(0,y,2048,7+(y-250)*0.05); }
  g.globalCompositeOperation='source-over';
  for(let x=0;x<2048;){
    const w=30+Math.random()*80, h=50+Math.random()*190;
    g.fillStyle='#0c0520'; g.fillRect(x,512-h,w,h);
    for(let i=0;i<h/26;i++){
      if(Math.random()<0.5){
        g.fillStyle=Math.random()<0.5?'#ff5fd0':'#37f6ff';
        g.fillRect(x+5+Math.random()*(w-12), 512-h+8+i*24, 4, 5);
      }
    }
    x+=w+6;
  }
  const tex=new THREE.CanvasTexture(cv);
  const cyl=new THREE.Mesh(
    new THREE.CylinderGeometry(470,470,280,48,1,true),
    new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.BackSide, fog:false, depthWrite:false})
  );
  cyl.position.y=70; cyl.renderOrder=-2; skyGroup.add(cyl);

  // stars
  const sp=new Float32Array(350*3);
  for(let i=0;i<350;i++){
    const a=Math.random()*Math.PI*2, e=0.15+Math.random()*1.3, r=600;
    sp[i*3]=Math.cos(a)*Math.cos(e)*r; sp[i*3+1]=Math.sin(e)*r; sp[i*3+2]=Math.sin(a)*Math.cos(e)*r;
  }
  const sg=new THREE.BufferGeometry(); sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  const stars=new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:1.6,sizeAttenuation:false,transparent:true,opacity:0.75,fog:false,depthWrite:false}));
  stars.renderOrder=-1; skyGroup.add(stars);
}

/* rain */
const RAIN_N=800;
const rainGeo=new THREE.BufferGeometry();
const rainPos=new Float32Array(RAIN_N*3);
for(let i=0;i<RAIN_N;i++){ rainPos[i*3]=(Math.random()-0.5)*140; rainPos[i*3+1]=Math.random()*45; rainPos[i*3+2]=(Math.random()-0.5)*140; }
rainGeo.setAttribute('position',new THREE.BufferAttribute(rainPos,3));
const rain=new THREE.Points(rainGeo,new THREE.PointsMaterial({color:0x8fb6ff,size:0.14,transparent:true,opacity:0.5,depthWrite:false}));
scene.add(rain);

/* ============================== PATH ================================ */
const path=[];
let genH=0, genX=0, genZ=0, sectLeft=24, sectCurv=0;
function extendPath(target){
  while(path.length<target){
    if(sectLeft<=0){
      const r=Math.random();
      if(r<0.38){ sectCurv=0; sectLeft=8+(Math.random()*14|0); }
      else if(r<0.74){ sectCurv=(Math.random()<0.5?-1:1)*(0.012+Math.random()*0.02); sectLeft=9+(Math.random()*10|0); }
      else { sectCurv=(Math.random()<0.5?-1:1)*(0.034+Math.random()*0.024); sectLeft=6+(Math.random()*8|0); }
    }
    genH+=sectCurv; sectLeft--;
    genX+=Math.sin(genH)*STEP; genZ-=Math.cos(genH)*STEP;
    path.push({x:genX,z:genZ,h:genH});
    onNewPoint(path.length-1);
  }
}
const _v=new THREE.Vector3();
function pathPos(idx,lat,y,out){
  const p=path[idx]; out=out||_v;
  out.set(p.x+Math.cos(p.h)*lat, y||0, p.z+Math.sin(p.h)*lat);
  return out;
}

const COLS=[
  {o:-(HALF+1.7), y:1.15, c:[1.0,0.14,0.62]},
  {o:-HALF,       y:0,    c:[0.05,1.0,1.0]},
  {o:-HALF+1.15,  y:0,    c:[0.016,0.016,0.05]},
  {o:-0.18,       y:0,    c:[0.5,0.06,0.55]},
  {o: 0.18,       y:0,    c:[0.5,0.06,0.55]},
  {o: HALF-1.15,  y:0,    c:[0.016,0.016,0.05]},
  {o: HALF,       y:0,    c:[0.05,1.0,1.0]},
  {o: (HALF+1.7), y:1.15, c:[1.0,0.14,0.62]},
];
const roadMat=new THREE.MeshBasicMaterial({vertexColors:true, side:THREE.DoubleSide});

function makeSegGeo(){
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(16*3),3));
  const cols=new Float32Array(16*3);
  for(let r=0;r<2;r++) for(let c=0;c<8;c++){
    const k=(r*8+c)*3; cols[k]=COLS[c].c[0]; cols[k+1]=COLS[c].c[1]; cols[k+2]=COLS[c].c[2];
  }
  geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  const idx=[];
  for(let c=0;c<7;c++){ const a=c,b=c+1,cc=8+c+1,d=8+c; idx.push(a,b,cc, a,cc,d); }
  geo.setIndex(idx);
  return geo;
}
function setSeg(mesh,i){
  const p0=path[i], p1=path[i+1];
  const pos=mesh.geometry.attributes.position.array;
  for(let r=0;r<2;r++){
    const p=r?p1:p0, cs=Math.cos(p.h), sn=Math.sin(p.h);
    for(let c=0;c<8;c++){
      const k=(r*8+c)*3, col=COLS[c];
      pos[k]=p.x+cs*col.o; pos[k+1]=col.y; pos[k+2]=p.z+sn*col.o;
    }
  }
  mesh.geometry.attributes.position.needsUpdate=true;
  mesh.geometry.computeBoundingSphere();
  mesh.userData.idx=i;
}

const PN=320;
const pGeo=new THREE.BufferGeometry();
const pPos=new Float32Array(PN*3), pCol=new Float32Array(PN*3);
const pVel=new Float32Array(PN*3), pLife=new Float32Array(PN);
pPos.fill(0); pLife.fill(0);
for(let i=0;i<PN;i++) pPos[i*3+1]=-999;
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
const pts=new THREE.Points(pGeo,new THREE.PointsMaterial({size:0.4,vertexColors:true,transparent:true,opacity:0.95,blending:THREE.AdditiveBlending,depthWrite:false}));
pts.frustumCulled=false; scene.add(pts);
let pCursor=0;
const _c=new THREE.Color();
function burst(x,y,z,hex,count,spd){
  _c.setHex(hex);
  for(let n=0;n<count;n++){
    const i=pCursor; pCursor=(pCursor+1)%PN;
    pPos[i*3]=x; pPos[i*3+1]=y; pPos[i*3+2]=z;
    pVel[i*3]=(Math.random()-0.5)*spd;
    pVel[i*3+1]=Math.random()*spd*0.8;
    pVel[i*3+2]=(Math.random()-0.5)*spd;
    pCol[i*3]=_c.r; pCol[i*3+1]=_c.g; pCol[i*3+2]=_c.b;
    pLife[i]=0.5+Math.random()*0.7;
  }
  pGeo.attributes.color.needsUpdate=true;
}
function updateParticles(dt){
  for(let i=0;i<PN;i++){
    if(pLife[i]<=0) continue;
    pLife[i]-=dt;
    pPos[i*3]+=pVel[i*3]*dt; pPos[i*3+1]+=pVel[i*3+1]*dt; pPos[i*3+2]+=pVel[i*3+2]*dt;
    pVel[i*3+1]-=12*dt;
    if(pLife[i]<=0) pPos[i*3+1]=-999;
  }
  pGeo.attributes.position.needsUpdate=true;
}

function spawnBarricade(idx){
  const count=1+(Math.random()<0.45?1:0);
  const usedLats=[];
  for(let n=0;n<count;n++){
    let lat;
    for(let tries=0;tries<8;tries++){
      lat=(Math.random()*2-1)*(HALF-2.2);
      if(usedLats.every(u=>Math.abs(u-lat)>4.2)) break;
    }
    usedLats.push(lat);
    const m=new THREE.Mesh(barrGeo,barrMat);
    m.add(new THREE.LineSegments(barrEdge,new THREE.LineBasicMaterial({color:0xffffff})));
    pathPos(idx,lat,1.05,m.position);
    m.rotation.y=-path[idx].h;
    scene.add(m);
    addHazard({type:'barr', idx, lat, long:idx*STEP, meshes:[m], missed:false});

      if(r<0.34) spawnBarricade(idx);
      else if(r<0.60) spawnPickups(idx);
      else if(r<0.78) spawnRamp(idx);
      else spawnSpikes(idx);
    }
    const gap=THREE.MathUtils.lerp(62,30,intensity())*diff.gapMul*(0.8+Math.random()*0.5);
    nextLong+=gap;
  }
}

/* hazard updates */
function updateHazards(dt){
  for(let i=hazards.length-1;i>=0;i--){
    const h=hazards[i];
    const dLong=h.long-carLong;

    if(h.type==='pick'){
      h.meshes[0].rotation.y+=dt*3;
      h.meshes[0].position.y=1.2+Math.sin(elapsed*4+h.idx)*0.25;
      if(Math.abs(dLong)<2.4 && Math.abs(h.lat-carLat)<2 && Math.abs(carY-0.8)<2.6){
        collect(h); removeHazardMeshes(h); hazards.splice(i,1); continue;
      }
    }
    else if(h.type==='barr'){
      if(!h.missed && dLong<-1.4){
        h.missed=true;
        const d=Math.abs(h.lat-carLat);
        if(d>1.6 && d<3.6 && carY<2){ reward(40,'NEAR MISS'); nitro=Math.min(100,nitro+8); sfx.near(); }
      }
      if(Math.abs(dLong)<1.5 && Math.abs(h.lat-carLat)<2.15 && carY<1.9){
        burst(h.meshes[0].position.x,1.2,h.meshes[0].position.z,0xff2d95,26,10);
        removeHazardMeshes(h); hazards.splice(i,1);
        damage(); continue;
      }
    }
    else if(h.type==='spike'){
      if(h.state==='idle' && dLong<80){
        h.state='warn'; h.t=0;
        h.sign.visible=true; h.chevs.forEach(c=>c.visible=true);
        showWarn('\u26A0 SPIKES AHEAD \u2014 DODGE OR JUMP!');
        sfx.warn();
      }
      else if(h.state==='warn'){
        h.t+=dt;
        const f=(Math.sin(h.t*16)>0)?1:0.25;
        h.sign.material.opacity=f; h.chevs.forEach(c=>c.visible=f>0.5);
        h.sign.position.y=3.2+Math.sin(h.t*3)*0.2;
        if(h.t>1.9 || dLong<14){
          h.state='armed'; sfx.spikes();
          h.spikes.scale.y=0.02;
        }
      }
      else if(h.state==='armed'){
        h.spikes.scale.y=Math.min(1.15,h.spikes.scale.y+dt*7);
        if(Math.abs(dLong)<1.6){
          if(carY>0.5 || airborne){
            if(!h.jumped && Math.abs(h.lat-carLat)<h.halfW+0.8){
              h.jumped=true; reward(90,'SPIKES JUMPED!'); sfx.jump();
            }
          } else if(Math.abs(h.lat-carLat)<h.halfW+0.7){
            damage(); speed*=0.5;
            burst(carX,0.4,carZ,0xffb300,20,8);
            h.state='done';
          }
        }
        if(dLong<-4){ h.state='done'; h.sign.visible=false; h.chevs.forEach(c=>c.visible=false); }
      }
    }
    else if(h.type==='laser'){
      h.t+=dt;
      if(h.state==='aim'){
        const k=h.t/1.7;
        h.ring.scale.setScalar(1+Math.sin(h.t*18)*0.1);
        h.ring.material.opacity=0.5+k*0.5;
        h.disc.material.opacity=0.06+k*0.22;
        h.pillar.material.opacity=0.03+k*0.12;
        if(h.t>1.7){ h.state='fire'; h.t=0; sfx.laserFire(); hideWarnSoon(); }
      }
      else if(h.state==='fire'){
        h.beam.material.opacity=Math.max(0,1-h.t*3)*0.95;
        h.shock.material.opacity=Math.max(0,0.8-h.t*2);
        h.shock.scale.setScalar(1+h.t*22);
        if(!h.hitDone){
          h.hitDone=true;
          burst(h.ring.position.x,0.5,h.ring.position.z,0xff5522,40,16);
          burst(h.ring.position.x,0.5,h.ring.position.z,0xffffff,14,22);
          const d=Math.hypot(h.ring.position.x-carX,h.ring.position.z-carZ);
          shake=Math.max(shake,THREE.MathUtils.clamp(1.6-d*0.05,0.15,1.4));
          if(d<4.4){ damage(); speed*=0.55; }
          else if(d<10){ reward(120,'LASER DODGED!'); }
        }
        if(h.t>0.5){
          h.state='done';
          h.ring.material.opacity=0; h.disc.material.opacity=0; h.pillar.material.opacity=0;
        }
      }
      else if(h.t>1.2){ removeHazardMeshes(h); hazards.splice(i,1); continue; }
    }

    if(h.long<carLong-40){ removeHazardMeshes(h); hazards.splice(i,1); }
  }
}
function collect(h){
  burst(h.meshes[0].position.x,1.2,h.meshes[0].position.z,
    h.kind==='shield'?0x00f3ff:h.kind==='nitro'?0xffb300:0xff4fc3, 16, 7);
  if(h.kind==='shield'){
    if(shields<diff.shields){ shields++; popup('SHIELD +1','var(--cyan)'); updateShields(); }
    else reward(80,'SHIELD FULL +80');
    sfx.pickup();
  } else if(h.kind==='nitro'){
    nitro=Math.min(100,nitro+38); popup('NITRO +','var(--amber)'); sfx.nitroPick();
  } else { reward(60,'+60'); sfx.pickup(); }
}

/* ============================ RAMP PHYSICS ========================== */
function rampCheck(){
  onRamp=false; rampProg=0;
  for(const h of hazards){
    if(h.type!=='ramp') continue;
    const d=carLong-h.long;
    if(d>=-0.5 && d<=10 && Math.abs(carLat-h.lat)<2.4){
      onRamp=true; rampProg=THREE.MathUtils.clamp(d/10,0,1);
      break;
    }
  }
}

/* ============================ GAME EVENTS =========================== */
function damage(){
  if(invuln>0 || state!==S.RUN) return;
  shields--;
  updateShields(true);
  combo=0;
  if(shields<0){ crash(); return; }
  invuln=2.2; shake=Math.max(shake,0.9);
  speed*=0.55;
  sfx.hit();
  burst(carX,0.8,carZ,0x00f3ff,22,9);
  popup('SHIELD DOWN!','var(--danger)');
}
function crash(){
  state=S.CRASH; timeScale=0.28;
  sfx.explode();
  shake=1.8;
  burst(carX,1,carZ,0xffaa33,60,18);
  burst(carX,1,carZ,0xff2d95,40,14);
  burst(carX,1,carZ,0xffffff,20,24);
  carBody.visible=false;
  hideWarn();
  music.volume=0.3;
  setTimeout(()=>{
    timeScale=1;
    showGameOver();
  },1500);
}
const QUIPS=['SO CLOSE \u2014 GO AGAIN!','THE CITY REMEMBERS YOUR RUN','LEGENDS RESPAWN',
  'THAT LASER GOT LUCKY','NICE DRIVING \u2014 ONE MORE LAP?','ALMOST BEAT THE GRID!'];
function showGameOver(){
  state=S.OVER;
  const dist=Math.round(carLong-runStart);
  bestDist=Math.max(bestDist,dist);
  $('final-score').textContent=Math.round(score).toLocaleString();
  $('go-quip').textContent=QUIPS[(Math.random()*QUIPS.length)|0];
  $('go-stats').innerHTML=
    'DISTANCE <b>'+dist.toLocaleString()+' m</b><br>'+
    'TOP SPEED <b>'+Math.round(topSpeed*3.6)+' km/h</b><br>'+
    'SESSION BEST <b>'+bestDist.toLocaleString()+' m</b>';
  $('over-screen').classList.remove('hidden');
  music.pause();
}
function reward(base,label){
  combo=Math.min(combo+1,8); comboT=4;
  const mult=1+ (combo-1)*0.25;
  const pts=Math.round(base*mult);
  score+=pts;
  popup(label+(combo>1?'  x'+combo:''), combo>3?'var(--amber)':'var(--cyan)');
}

/* ============================== HUD ================================= */
function updateShields(hurt){
  shieldRow.innerHTML='';
  for(let i=0;i<diff.shields;i++){
    const d=document.createElement('div');
    d.className='cell'+(i<shields?' on':'');
    if(hurt && i===shields) d.classList.add('hurt');
    shieldRow.appendChild(d);
  }
}
let warnCount=0;
function showWarn(txt){
  warnEl.textContent=txt; warnEl.classList.add('show');
  warnCount++;
  setTimeout(()=>{ if(--warnCount<=0){ warnCount=0; warnEl.classList.remove('show'); } },2100);
}
function hideWarn(){ warnCount=0; warnEl.classList.remove('show'); }
function hideWarnSoon(){ setTimeout(hideWarn,150); }
function popup(txt,color){
  const d=document.createElement('div');
  d.className='pop'; d.textContent=txt;
  d.style.color='#fff';
  d.style.textShadow='0 0 12px '+(color||'var(--cyan)')+', 0 0 26px '+(color||'var(--cyan)');
  d.style.top=(Math.random()*46)+'px';
  popups.appendChild(d);
  setTimeout(()=>d.remove(),1200);
}

/* ============================== INPUT =============================== */
const keys={};
addEventListener('keydown',e=>{ keys[e.code]=true; if(e.code==='Space') e.preventDefault(); });
addEventListener('keyup',e=>{ keys[e.code]=false; });
function bindHold(el,on,off){
  const set=v=>{ v?el.classList.add('pressed'):el.classList.remove('pressed'); v?on():off(); };
  el.addEventListener('pointerdown',e=>{ e.preventDefault(); el.setPointerCapture(e.pointerId); set(true); });
  el.addEventListener('pointerup',()=>set(false));
  el.addEventListener('pointercancel',()=>set(false));
  el.addEventListener('lostpointercapture',()=>set(false));
}
let tLeft=false,tRight=false,tNitro=false;
bindHold($('btn-left'),()=>tLeft=true,()=>tLeft=false);
bindHold($('btn-right'),()=>tRight=true,()=>tRight=false);
bindHold($('btn-nitro'),()=>tNitro=true,()=>tNitro=false);

/* steering wheel (drag joystick) */
let ctrlMode='arrows', joyVal=0, joyId=null;
const joyEl=$('joystick'), joyKnob=$('joy-knob');
function joyMove(e){
  const r=joyEl.getBoundingClientRect();
  const max=r.width/2-32;
  const dx=THREE.MathUtils.clamp(e.clientX-(r.left+r.width/2),-max,max);
  joyVal=dx/max;
  joyKnob.style.transform='translateX('+dx+'px)';
}
joyEl.addEventListener('pointerdown',e=>{
  e.preventDefault(); joyId=e.pointerId;
  joyEl.setPointerCapture(e.pointerId); joyMove(e);
});
joyEl.addEventListener('pointermove',e=>{ if(e.pointerId===joyId) joyMove(e); });
function joyEnd(e){
  if(e.pointerId!==joyId) return;
  joyId=null; joyVal=0; joyKnob.style.transform='translateX(0)';
}
joyEl.addEventListener('pointerup',joyEnd);
joyEl.addEventListener('pointercancel',joyEnd);
joyEl.addEventListener('lostpointercapture',joyEnd);
document.querySelectorAll('.cmode').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.cmode').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    ctrlMode=b.dataset.c;
    document.body.classList.toggle('mode-wheel',ctrlMode==='wheel');
  });
});

$('pause-btn').addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(state!==S.RUN) return;
  paused=!paused;
  $('pause-btn').textContent=paused?'\u25B6':'II';
  paused?music.pause():(musicOK&&music.play().catch(()=>{}));
});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden && state===S.RUN && !paused){
    paused=true; $('pause-btn').textContent='\u25B6'; music.pause();
  }
});

/* ============================== MENU ================================ */
document.querySelectorAll('.diff').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.diff').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    diff=DIFFS[+b.dataset.d];
  });
});
$('track-select').addEventListener('change',e=>loadTrack(e.target.value));
loadTrack($('track-select').value);

function startRun(){
  audioInit();
  if(ac && ac.state==='suspended') ac.resume();
  $('start-screen').classList.add('hidden');
  $('over-screen').classList.add('hidden');
  carBody.visible=true;
  shields=diff.shields; updateShields();
  score=0; combo=0; nitro=40; invuln=0;
  speed=Math.max(speed,10);
  runStart=carLong; topSpeed=0; nextMilestone=500;
  laserT=12; nextLong=carLong+240;
  // clear existing hazards
  for(const h of hazards) removeHazardMeshes(h);
  hazards.length=0;
  hideWarn();
  state=S.RUN; paused=false; $('pause-btn').textContent='II';
  music.volume=0.85;
  try{ music.currentTime=0; }catch(e){}
  if(musicOK) music.play().catch(()=>{});
  sfx.nitroGo();
}
$('btn-start').addEventListener('click',startRun);
$('btn-restart').addEventListener('click',startRun);
updateShields();

/* ============================ MAIN LOOP ============================= */
const clock=new THREE.Clock();
const camPos=new THREE.Vector3(0,4,10);
let bassPrev=0;

function autopilotSteer(){
  const targetH=path[Math.min(carIdx+3,path.length-1)].h - carLat*0.05;
  return THREE.MathUtils.clamp((targetH-carH)*3,-1,1);
}

function frame(){
  requestAnimationFrame(frame);
  let dt=Math.min(clock.getDelta(),0.05);
  if(paused){ renderer.render(scene,camera); return; }
  dt*=timeScale;
  elapsed+=dt;

  /* ------- music pulse ------- */
  pulse*=Math.pow(0.05,dt);
  if(analyser && musicOK && !music.paused){
    analyser.getByteFrequencyData(freqData);
    let low=0; for(let i=1;i<6;i++) low+=freqData[i];
    low/=5*255;
    if(low>0.6 && bassPrev<=0.6) pulse=1;
    bassPrev=low;
  } else if(state===S.RUN){
    if(Math.sin(elapsed*4)>0.97) pulse=Math.max(pulse,0.4);
  }
  roadMat.color.setScalar(1+pulse*0.55);
  archMats.forEach(m=>m.color.offsetHSL(dt*0.05,0,0));

  /* ------- driving ------- */
  const running=(state===S.RUN||state===S.MENU);
  if(running){
    let input=0;
    if(state===S.MENU) input=autopilotSteer();
    else{
      if(keys['ArrowLeft']||keys['KeyA']||(ctrlMode==='arrows'&&tLeft)) input-=1;
      if(keys['ArrowRight']||keys['KeyD']||(ctrlMode==='arrows'&&tRight)) input+=1;
      if(ctrlMode==='wheel') input=THREE.MathUtils.clamp(input+joyVal,-1,1);
    }
    steer+=(input-steer)*Math.min(1,dt*10);

    nitroOn = state===S.RUN && (keys['Space']||keys['ShiftLeft']||keys['ShiftRight']||tNitro) && nitro>0;
    if(nitroOn){ nitro-=26*dt; if(nitro<0){nitro=0;nitroOn=false;} }

    const maxS = state===S.MENU?13:diff.maxSpeed*(nitroOn?1.45:1);
    speed += THREE.MathUtils.clamp(maxS-speed,-14,9)*dt*(speed>maxS?2.2:1);
    topSpeed=Math.max(topSpeed,speed);

    const steerScale=(airborne?0.35:1)*Math.min(1,speed/9);
    carH += steer*1.95*steerScale*dt;

    carX += Math.sin(carH)*speed*dt;
    carZ -= Math.cos(carH)*speed*dt;

    /* path tracking */
    extendPath(carIdx+170);
    while(carIdx<path.length-2){
      const n=path[carIdx+1];
      const dx=carX-n.x, dz=carZ-n.z;
      if(dx*Math.sin(n.h)-dz*Math.cos(n.h)>0) carIdx++;
      else break;
    }
    const p=path[carIdx];
    const rx=carX-p.x, rz=carZ-p.z;
    carLat = rx*Math.cos(p.h)+rz*Math.sin(p.h);
    const fwd = rx*Math.sin(p.h)-rz*Math.cos(p.h);
    carLong = carIdx*STEP+THREE.MathUtils.clamp(fwd,0,STEP);

    /* edge walls */
    const lim=HALF-0.95;
    if(Math.abs(carLat)>lim){
      const over=Math.abs(carLat)-lim;
      carLat=Math.sign(carLat)*lim;
      carX=p.x+Math.cos(p.h)*carLat+Math.sin(p.h)*fwd;
      carZ=p.z+Math.sin(p.h)*carLat-Math.cos(p.h)*fwd;
      carH += (p.h-carH)*Math.min(1,dt*4);
      speed*=1-Math.min(0.5,over)*dt*2;
      shake=Math.max(shake,0.12);
      if(Math.random()<dt*22) burst(carX+Math.sign(carLat),0.4,carZ,0x00f3ff,3,5);
    }

    /* ramps & jumping */
    const prevProg=rampProg;
    prevOnRamp=onRamp;
    rampCheck();
    if(onRamp && !airborne){
      carY=rampProg*2.4; vy=0;
    } else if(prevOnRamp && !onRamp && prevProg>0.8 && !airborne){
      vy=speed*0.25+3.2; airborne=true; airTime=0; sfx.jump();
      burst(carX,0.4,carZ,0x00f3ff,10,6);
    }
    if(airborne){
      vy-=34*dt; carY+=vy*dt; airTime+=dt;
      if(carY<=0){
        carY=0; vy=0; airborne=false;
        if(airTime>0.4){ reward(80,'AIR TIME!'); }
        sfx.land(); shake=Math.max(shake,0.25);
        burst(carX,0.2,carZ,0x8877ff,12,5);
      }
    } else if(!onRamp) carY=Math.max(0,carY-8*dt);

    /* run systems */
    if(state===S.RUN){
      runSpawner();
      updateHazards(dt);
      laserT-=dt;
      if(laserT<=0){
        scheduleLaser();
        laserT=THREE.MathUtils.lerp(15,7.5,intensity())*diff.laserMul*(0.8+Math.random()*0.4);
      }
      invuln=Math.max(0,invuln-dt);
      comboT-=dt; if(comboT<=0) combo=0;
      score+=speed*dt;
      const dist=carLong-runStart;
      if(dist>=nextMilestone){
        popup(nextMilestone+'m \u2014 '+(nextMilestone>=2000?'UNSTOPPABLE!':nextMilestone>=1000?'ON FIRE!':'NICE PACE!'),'var(--purple)');
        nextMilestone+=500;
      }
      hudScore.textContent=Math.round(score).toLocaleString();
      hudSpeed.textContent=Math.round(speed*3.6)+' km/h';
      hudDist.textContent=Math.round(dist)+' m';
      nitroFill.style.width=nitro+'%';
      nitroFx.style.opacity=nitroOn?1:0;
    }
    recycleScenery();
  }
  if(state===S.CRASH){
    speed=Math.max(0,speed-30*dt);
    carX+=Math.sin(carH)*speed*dt; carZ-=Math.cos(carH)*speed*dt;
    if(Math.random()<dt*30) burst(carX,0.8,carZ,0xff6622,4,6);
  }

  /* recycle road segments */
  while(carIdx-segHead>8){
    const m=segs.shift();
    setSeg(m,segHead+N_SEG);
    segs.push(m);
    segHead++;
  }

  /* ------- car visuals ------- */
  car.position.set(carX,carY,carZ);
  car.rotation.y=-carH;
  carBody.rotation.z += ((-steer*0.34)-carBody.rotation.z)*Math.min(1,dt*8);
  carBody.rotation.x += ((airborne?-vy*0.02:0)-carBody.rotation.x)*Math.min(1,dt*6);
  carBody.position.y=0.08+Math.sin(elapsed*9)*0.04;
  if(invuln>0) carBody.visible=(elapsed*14|0)%2===0 || state!==S.RUN;
  else if(state!==S.CRASH && state!==S.OVER) carBody.visible=true;
  const fl=nitroOn?1.9:0.55+Math.random()*0.25;
  flames.forEach(f=>{ f.scale.set(1,fl+Math.random()*0.3,1); });
  flameMat.color.setHex(nitroOn?0x33ccff:0xff9030);

  /* ------- camera ------- */
  const back=8.6, h=4.1;
  const dx=Math.sin(carH), dz=-Math.cos(carH);
  camPos.set(carX-dx*back, h+carY*0.55, carZ-dz*back);
  camera.position.lerp(camPos,1-Math.pow(0.0012,dt));
  shake=Math.max(0,shake-dt*2.2);
  if(shake>0){
    camera.position.x+=(Math.random()-0.5)*shake*0.7;
    camera.position.y+=(Math.random()-0.5)*shake*0.5;
  }
  camera.lookAt(carX+dx*11, 1.3+carY*0.7, carZ+dz*11);
  const targetFov=70+(speed/40)*6+(nitroOn?9:0);
  camera.fov+=(targetFov-camera.fov)*Math.min(1,dt*4);
  camera.updateProjectionMatrix();

  /* ------- ambience ------- */
  skyGroup.position.set(camera.position.x,0,camera.position.z);
  const rp=rainGeo.attributes.position.array;
  for(let i=0;i<RAIN_N;i++){
    rp[i*3+1]-=dt*38;
    if(rp[i*3+1]<0){
      rp[i*3]=camera.position.x+(Math.random()-0.5)*140;
      rp[i*3+1]=30+Math.random()*20;
      rp[i*3+2]=camera.position.z+(Math.random()-0.5)*140;
    }
  }
  rainGeo.attributes.position.needsUpdate=true;
  updateParticles(dt);

  renderer.render(scene,camera);
}
frame();
})();
</script>
